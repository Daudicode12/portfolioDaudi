name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm ci
      working-directory: ./react-portfolio
    - name: Run tests
      run: npm run test --silent
      working-directory: ./react-portfolio
    - name: Build
      run: npm run build --silent
      working-directory: ./react-portfolio
